
services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: skilltrade-app:latest
    container_name: st-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: skilltrade
      DB_USER: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      LT_URL: http://libretranslate:5000/translate
      LT_KEY: ""
      HF_TOKEN: "${HF_TOKEN:-}"
      SERVER_PORT: "8080"
      JAVA_OPTS: "-Xms256m -Xmx512m"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      libretranslate:
        condition: service_started

  libretranslate:
    image: libretranslate/libretranslate:latest
    container_name: st-libretranslate
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      LT_DISABLE_WEB_UI: "false"
    volumes:
      - libretranslate_models:/home/libretranslate/.local
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5000/languages"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 600s

  postgres:
    image: postgres:16-alpine
    container_name: st-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: skilltrade
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d skilltrade"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: st-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  libretranslate_models:
  postgres_data:
  redis_data:
